version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plant-disease-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data/sample:/app/data/sample
    environment:
      - MODEL_PATH=models/best_model.pt
      - CLASS_NAMES_PATH=models/class_names.json
      - DEBUG=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", 
             "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3